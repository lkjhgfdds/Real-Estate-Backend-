name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: test_secret_key_at_least_32_chars_long_for_test
      JWT_REFRESH_SECRET: test_refresh_secret_different_key_for_test_env
      JWT_EXPIRES_IN: 1d
      REDIS_URL: ''
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MONGOMS_DOWNLOAD_DIR: .cache/mongodb-binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: .cache/mongodb-binaries
          key: ${{ runner.os }}-mongodb-memory-server-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run test coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore
