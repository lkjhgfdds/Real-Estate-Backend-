name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · Test · Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: test_secret_key_at_least_32_chars_long_for_test
      JWT_REFRESH_SECRET: test_refresh_secret_different_key_for_test_env
      JWT_EXPIRES_IN: 1d
      REDIS_URL: ''
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      PAYMOB_WEBHOOK_SECRET: test_paymob_webhook_secret_32chars!!
      MONGOMS_DOWNLOAD_DIR: .cache/mongodb-binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: .cache/mongodb-binaries
          key: ${{ runner.os }}-mongodb-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mongodb-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Run tests with coverage
        run: npm run test:coverage
        # Fails the build if coverage thresholds (70/80/80) are not met

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

      - name: Build Docker Image
        run: docker build -t real-estate-backend:latest .
